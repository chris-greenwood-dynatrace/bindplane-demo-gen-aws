# SINGLE SOURCE OF TRUTH for the manufacturing demo.
# Terraform (locals.tf) and scripts/ read ONLY this file; they never special-case a demo name.
# See ../../CLAUDE.md for the demo contract + non-negotiable rules.

name: manufacturing
display_name: "Manufacturing — Factory Machine Fleet"
description: >
  BindPlane managing a fleet of OpenTelemetry collectors across a factory: production lines,
  packaging, and plant utilities. Each simulated machine emits ALL THREE signals (metrics + logs +
  traces) over OTLP with identical resource attributes, so every machine correlates into one
  Dynatrace entity. Reusable across manufacturing verticals via business_variants.
business_variants: [automotive, food_bev, pharma, electronics, metals]

# ── Collector fleet (agent/gateway pattern). MUST be <= 10 (BindPlane free cap). ──
# Each running BDOT instance = 1 against the 10 limit. Every collector enrolls with the SAME OpAMP
# endpoint+secret; the per-collector OPAMP_LABELS below differentiate them. BindPlane Configurations
# target subsets by these labels. Labels here MUST equal demos/manufacturing/collectors/<name>.env
# and the selectors in demos/manufacturing/bindplane/configurations.yaml.
#
# Per-device-signals model: each edge collector receives metrics+logs+traces (all OTLP) from the
# machines on its line, then forwards to the gateway. No signal-split collectors.
collectors:
  total: 6
  gateway:
    name: gateway
    represents: "Site gateway — OTLP in from edges + host metrics; OWNS the Dynatrace destination"
    labels: { role: gateway, demo: manufacturing, site: plant-1 }
  edges:
    - name: line-a
      represents: "Production line A (CNC mills) — machines emit metrics+logs+traces via OTLP"
      labels: { role: edge, demo: manufacturing, line: A }
    - name: line-b
      represents: "Production line B (CNC lathes + robots)"
      labels: { role: edge, demo: manufacturing, line: B }
    - name: line-c
      represents: "Production line C (assembly)"
      labels: { role: edge, demo: manufacturing, line: C }
    - name: packaging
      represents: "Packaging machine group"
      labels: { role: edge, demo: manufacturing, line: pkg }
    - name: utilities
      represents: "Plant utilities (HVAC, compressors, chillers)"
      labels: { role: edge, demo: manufacturing, line: util }

# ── Three-signal contract: each non-empty, each backed by a simulator service in docker-compose. ──
# Every device-sim service emits ALL THREE signals, so the same services appear under each key.
signals:
  metrics: [device-line-a, device-line-b, device-line-c, device-packaging, device-utilities]
  logs:    [device-line-a, device-line-b, device-line-c, device-packaging, device-utilities]
  traces:  [device-line-a, device-line-b, device-line-c, device-packaging, device-utilities]

# ── Volume / cadence guardrails (stay under 10 GB/day free cap). ──
caps:
  est_gb_per_day: 4.0
  scrape_interval_s: 30

# ── BDOT (BindPlane Distro for OpenTelemetry) collector image. PINNED — never :latest. ──
bdot_image: "ghcr.io/observiq/bindplane-agent:1.101.2"

# ── Optional: recommended instance type override (read by terraform locals as instance_type_hint). ──
instance_type_hint: "t3.large"

# ── Wiring hints for scripts / compose (relative to this demo dir). ──
compose_file: docker-compose.yaml
bindplane_dir: bindplane
