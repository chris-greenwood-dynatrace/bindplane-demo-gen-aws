# SINGLE SOURCE OF TRUTH for the retail demo.
# Terraform (locals.tf) and scripts/ read ONLY this file; they never special-case a demo name.
# See ../../CLAUDE.md for the demo contract + non-negotiable rules.

name: retail
display_name: "Retail — Store Edge Fleet (POS · Payments · Inventory · Cold Chain · Network · Digital)"
description: >
  BindPlane managing a fleet of OpenTelemetry collectors across a retail chain's per-store edge:
  POS terminals, payment terminals + gateways, inventory + RFID scanners, refrigeration / HVAC
  (cold chain — food safety), in-store Wi-Fi + WAN, and e-commerce / mobile-app digital
  experience. Each simulated asset emits ALL THREE signals (metrics + logs + traces) over OTLP
  with identical resource attributes, so every asset correlates into one Dynatrace entity.
  Stacks three layers in one demo — OT (refrigeration/HVAC) + IT (POS/network) + business
  (transactions/cart). Reusable across big-box, grocery, specialty, QSR, and convenience.
business_variants: [bigbox, grocery, specialty, qsr, convenience]

# ── Collector fleet (agent/gateway pattern). MUST be <= 10 (BindPlane free cap). ──
# Same labeling scheme as the other demos so config-targeting is consistent across demos:
#   role=gateway|edge, demo=retail, assetgroup=<group>. Labels here MUST equal
#   demos/retail/collectors/<name>.env and the selectors in bindplane/configurations.yaml.
#
# Per-asset unified-signals model: each edge collector receives metrics+logs+traces (all OTLP)
# from the assets it monitors, then forwards to the gateway. No signal-split collectors.
collectors:
  total: 7
  gateway:
    name: gateway
    represents: "Regional / HQ gateway — OTLP in from store edges + host metrics; OWNS the Dynatrace destination"
    labels: { role: gateway, demo: retail, region: region-east-1 }
  edges:
    - name: pos
      represents: "POS terminals (NCR / Toshiba / Verifone) — checkout terminals across stores"
      labels: { role: edge, demo: retail, assetgroup: pos }
    - name: payments
      represents: "Payment terminals + gateways (Ingenico / Adyen / Stripe Terminal) — EMV auth path"
      labels: { role: edge, demo: retail, assetgroup: payments }
    - name: inventory
      represents: "Inventory + RFID handheld scanners (Zebra / Honeywell) — backroom + sales-floor"
      labels: { role: edge, demo: retail, assetgroup: inventory }
    - name: fridge
      represents: "Refrigeration + HVAC (Emerson / Carrier) — cold chain / food safety"
      labels: { role: edge, demo: retail, assetgroup: fridge }
    - name: network
      represents: "In-store Wi-Fi + WAN edge (Meraki / Aruba) — guest + corp SSIDs, WAN uplinks"
      labels: { role: edge, demo: retail, assetgroup: network }
    - name: digital
      represents: "E-commerce + mobile app (Shopify-style stack) — checkout + cart + search"
      labels: { role: edge, demo: retail, assetgroup: digital }

# ── Three-signal contract: each non-empty, each backed by a simulator service in docker-compose. ──
# Every device-sim service emits ALL THREE signals, so the same services appear under each key.
signals:
  metrics: [device-pos, device-payments, device-inventory, device-fridge, device-network, device-digital]
  logs:    [device-pos, device-payments, device-inventory, device-fridge, device-network, device-digital]
  traces:  [device-pos, device-payments, device-inventory, device-fridge, device-network, device-digital]

# ── Volume / cadence guardrails (stay under 10 GB/day free cap). ──
caps:
  est_gb_per_day: 5.0
  scrape_interval_s: 30

# ── BDOT (BindPlane Distro for OpenTelemetry) collector image. PINNED — never :latest. ──
bdot_image: "ghcr.io/observiq/bindplane-agent:1.101.2"

# ── Optional: recommended VM size override (read by terraform locals as vm_size_hint). ──
vm_size_hint: "Standard_B2ms"

# ── Wiring hints for scripts / compose (relative to this demo dir). ──
compose_file: docker-compose.yaml
bindplane_dir: bindplane
