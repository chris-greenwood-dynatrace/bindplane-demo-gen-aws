# SINGLE SOURCE OF TRUTH for the networking demo.
# Terraform (locals.tf) and scripts/ read ONLY this file; they never special-case a demo name.
# See ../../CLAUDE.md for the demo contract + non-negotiable rules.

name: networking
display_name: "Networking — Network Device Fleet (NOC)"
description: >
  BindPlane managing a fleet of OpenTelemetry collectors monitoring network devices across a NOC:
  core/edge routers + switches, firewalls, and load balancers. Each simulated device emits ALL
  THREE signals (metrics + logs + traces) over OTLP with identical resource attributes, so every
  device correlates into one Dynatrace entity. Reusable across enterprise/ISP/campus/DC networks.
business_variants: [enterprise, isp, campus, datacenter, retail_wan]

# ── Collector fleet (agent/gateway pattern). MUST be <= 10 (BindPlane free cap). ──
# Same labeling scheme as the manufacturing demo so config-targeting is consistent across demos:
#   role=gateway|edge, demo=networking, devgroup=<group>. Labels here MUST equal
#   demos/networking/collectors/<name>.env and the selectors in bindplane/configurations.yaml.
#
# Per-device-signals model: each edge collector receives metrics+logs+traces (all OTLP) from the
# devices in its group, then forwards to the gateway. No signal-split collectors.
collectors:
  total: 5
  gateway:
    name: gateway
    represents: "NOC gateway — OTLP in from edges + host metrics; OWNS the Dynatrace destination"
    labels: { role: gateway, demo: networking, noc: primary }
  edges:
    - name: site-core
      represents: "Core routers + distribution switches — emit metrics+logs+traces via OTLP"
      labels: { role: edge, demo: networking, devgroup: core }
    - name: site-edge
      represents: "Edge / WAN routers"
      labels: { role: edge, demo: networking, devgroup: edge }
    - name: firewalls
      represents: "Firewalls"
      labels: { role: edge, demo: networking, devgroup: fw }
    - name: loadbalancers
      represents: "Load balancers"
      labels: { role: edge, demo: networking, devgroup: lb }

# ── Three-signal contract: each non-empty, each backed by a simulator service in docker-compose. ──
# Every device-sim service emits ALL THREE signals, so the same services appear under each key.
signals:
  metrics: [device-core, device-edge, device-fw, device-lb]
  logs:    [device-core, device-edge, device-fw, device-lb]
  traces:  [device-core, device-edge, device-fw, device-lb]

# ── Volume / cadence guardrails (stay under 10 GB/day free cap). ──
caps:
  est_gb_per_day: 3.0
  scrape_interval_s: 30

# ── BDOT (BindPlane Distro for OpenTelemetry) collector image. PINNED — never :latest. ──
bdot_image: "ghcr.io/observiq/bindplane-agent:1.101.2"

# ── Optional: recommended VM size override (read by terraform locals as vm_size_hint). ──
vm_size_hint: "Standard_B2ms"

# ── Wiring hints for scripts / compose (relative to this demo dir). ──
compose_file: docker-compose.yaml
bindplane_dir: bindplane
